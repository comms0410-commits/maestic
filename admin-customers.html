<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maestic - 고객 월별 현황 관리</title><link rel="stylesheet" href="css/style.css"></head><body><nav id="navbar" class="navbar"></nav><main class="container"><header class="page-header"><div><p class="eyebrow">MONTHLY STATUS</p><h1>고객 월별 현황 관리</h1><p>주차별 업로드 현황, 공개 메모, 내부 메모를 관리합니다.</p></div><div class="actions"><select id="customerSelect"></select><select id="monthSelect"><option value="2026-03">2026년 3월</option><option value="2026-04">2026년 4월</option></select></div></header><section class="panel"><div class="panel-header"><h2 id="title">월별 현황</h2><button id="saveBtn" class="primary-btn">저장 및 알림 발송</button></div><div class="panel-body"><div class="form-grid" id="statusForm"></div></div></section></main><script src="js/common.js"></script><script>Page.initProtected('admin');let state=Store.load();state.customers.forEach(c=>customerSelect.innerHTML+=`<option value="${c.customer_no}">${c.customer_name} (${c.customer_no})</option>`);function getRecord(){const [year,month]=monthSelect.value.split('-').map(Number);let r=state.monthly_status.find(x=>x.customer_no===customerSelect.value&&x.year===year&&x.month===month);if(!r){const c=state.customers.find(x=>x.customer_no===customerSelect.value);r={id:`m-${c.customer_no}-${year}-${month}`,customer_no:c.customer_no,year,month,total_target:c.monthly_quota,total_completed:0,week1_info:'',week1_done:0,week2_info:'',week2_done:0,week3_info:'',week3_done:0,week4_info:'',week4_done:0,public_note:'',internal_note:'',status:'in_progress'};state.monthly_status.push(r);}return r;}function render(){const c=state.customers.find(x=>x.customer_no===customerSelect.value);const r=getRecord();title.textContent=`${c.customer_name} · ${r.year}년 ${r.month}월`;statusForm.innerHTML=`${[1,2,3,4].map(w=>`<label class="field"><span>${w}주차 일정</span><input class="input" name="week${w}_info" value="${UI.escape(r[`week${w}_info`]||'')}"></label><label class="field"><span>${w}주차 완료수</span><input class="input" type="number" name="week${w}_done" value="${r[`week${w}_done`]||0}"></label>`).join('')}<label class="field"><span>월 목표</span><input class="input" type="number" name="total_target" value="${r.total_target||0}"></label><label class="field"><span>월 완료</span><input class="input" type="number" name="total_completed" value="${r.total_completed||0}"></label><label class="field"><span>상태</span><select name="status"><option value="in_progress">진행중</option><option value="completed">완료</option><option value="paused">일시정지</option></select></label><label class="field full"><span>고객 공개 메모</span><textarea name="public_note" rows="3">${UI.escape(r.public_note||'')}</textarea></label><label class="field full"><span>관리자 내부 메모</span><textarea name="internal_note" rows="3">${UI.escape(r.internal_note||'')}</textarea></label>`;statusForm.querySelector('[name=status]').value=r.status;}function save(){const r=getRecord();statusForm.querySelectorAll('input,textarea,select').forEach(el=>r[el.name]=el.type==='number'?Number(el.value):el.value);Store.save(state);const c=state.customers.find(x=>x.customer_no===r.customer_no);Webhook.send('status_update',c.customer_no,c.customer_name,`${r.year}년 ${r.month}월 현황이 업데이트되었습니다.`);UI.toast('월별 현황을 저장하고 알림을 기록했습니다.');}customerSelect.onchange=render;monthSelect.onchange=render;saveBtn.onclick=save;render();</script></body></html>
