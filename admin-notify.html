<!doctype html>
<html lang="ko">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Maestic - 알림</title><link rel="stylesheet" href="css/style.css" /></head>
  <body>
    <nav id="navbar" class="navbar"></nav>
    <main class="container">
      <header class="page-header"><div><p class="eyebrow">NOTIFICATIONS</p><h1>알림</h1><p>관리자 메시지를 고객에게 남기고, 고객 답글을 확인합니다.</p></div></header>
      <section class="grid dashboard-grid">
        <article class="panel">
          <div class="panel-header"><h2>고객 메시지 작성</h2></div>
          <form id="notifyForm" class="panel-body form">
            <label class="field"><span>고객</span><select name="customer_no" id="customerSelect"></select></label>
            <label class="field"><span>유형</span><select name="type"><option value="admin_message">관리자 메시지</option><option value="status_update">현황 업데이트</option><option value="pick_request">기사 Pick 요청</option><option value="script_uploaded">대본 검토 요청</option></select></label>
            <label class="field"><span>메시지</span><textarea name="message" rows="4" required></textarea></label>
            <button class="primary-btn">고객에게 메시지 남기기</button>
          </form>
        </article>
        <article class="panel">
          <div class="panel-header"><h2>알림 및 답글 이력</h2></div>
          <div id="list" class="panel-body stack"></div>
        </article>
      </section>
    </main>
    <script src="js/common.js"></script>
    <script>
      Page.initProtected('admin');
      let state = Store.load();
      state.customers.filter((c) => c.status !== 'deleted').forEach((c) => (customerSelect.innerHTML += `<option value="${c.customer_no}">${UI.escape(c.customer_name)}</option>`));
      function render() {
        state = Store.load();
        list.innerHTML = state.notifications.map((notification) => `<div class="card-row"><h3>${UI.escape(notification.customer_name)} ${UI.statusBadge(notification.send_status)}</h3><p>${notification.type} · ${new Date(notification.created_at).toLocaleString('ko-KR')}</p><p>${UI.escape(notification.message)}</p>${(notification.replies || []).map((reply) => `<div class="card-row"><p><strong>${UI.escape(reply.author_name)}</strong> · ${new Date(reply.created_at).toLocaleString('ko-KR')}</p><p>${UI.escape(reply.message)}</p></div>`).join('')}</div>`).join('') || '<div class="empty">알림 이력이 없습니다.</div>';
      }
      notifyForm.onsubmit = (event) => {
        event.preventDefault();
        const fd = new FormData(event.target);
        const customer = state.customers.find((c) => c.customer_no === fd.get('customer_no'));
        Notifier.send(fd.get('type'), customer.customer_no, customer.customer_name, fd.get('message'));
        UI.toast('고객에게 메시지를 남겼습니다.');
        event.target.reset();
        render();
      };
      render();
    </script>
  </body>
</html>
