<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maestic - 알림 이력</title><link rel="stylesheet" href="css/style.css"></head><body><nav id="navbar" class="navbar"></nav><main class="container"><header class="page-header"><div><p class="eyebrow">NOTIFICATIONS</p><h1>알림/Webhook 관리</h1><p>고객별 알림 발송 이력과 수동 알림을 관리합니다.</p></div></header><section class="grid dashboard-grid"><article class="panel"><div class="panel-header"><h2>수동 알림 발송</h2></div><form id="notifyForm" class="panel-body form"><label class="field"><span>고객</span><select name="customer_no" id="customerSelect"></select></label><label class="field"><span>유형</span><select name="type"><option value="status_update">현황 업데이트</option><option value="pick_request">기사 Pick 요청</option><option value="script_uploaded">대본 검토 요청</option></select></label><label class="field"><span>메시지</span><textarea name="message" rows="4" required></textarea></label><button class="primary-btn">알림 기록</button></form></article><article class="panel"><div class="panel-header"><h2>발송 이력</h2></div><div id="list" class="panel-body stack"></div></article></section></main><script src="js/common.js"></script><script>Page.initProtected('admin');let state=Store.load();state.customers.forEach(c=>customerSelect.innerHTML+=`<option value="${c.customer_no}">${c.customer_name}</option>`);function render(){state=Store.load();list.innerHTML=state.notifications.map(n=>`<div class="card-row"><h3>${UI.escape(n.customer_name)} ${UI.statusBadge(n.send_status)}</h3><p>${n.type} · ${new Date(n.created_at).toLocaleString('ko-KR')}</p><p>${UI.escape(n.message)}</p></div>`).join('')||'<div class="empty">알림 이력이 없습니다.</div>';}notifyForm.onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target);const c=state.customers.find(x=>x.customer_no===fd.get('customer_no'));Webhook.send(fd.get('type'),c.customer_no,c.customer_name,fd.get('message'));UI.toast('알림 이력을 기록했습니다.');e.target.reset();render();};render();</script></body></html>
