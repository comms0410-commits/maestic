<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maestic - 기사 Pick 관리</title><link rel="stylesheet" href="css/style.css"></head><body><nav id="navbar" class="navbar"></nav><main class="container"><header class="page-header"><div><p class="eyebrow">ARTICLE PICK</p><h1>기사 Pick 관리</h1><p>고객별 추천 기사 등록 및 Pick 결과를 확인합니다.</p></div></header><section class="grid dashboard-grid"><article class="panel"><div class="panel-header"><h2>추천 기사 등록</h2></div><form id="pickForm" class="panel-body form"><label class="field"><span>고객</span><select name="customer_no" id="customerSelect"></select></label><label class="field"><span>기사 제목</span><input class="input" name="title" required></label><label class="field"><span>기사 URL</span><input class="input" name="url" type="url" required></label><button class="primary-btn">등록 및 고객 알림</button></form></article><article class="panel"><div class="panel-header"><h2>추천 기사 현황</h2></div><div id="list" class="panel-body stack"></div></article></section></main><script src="js/common.js"></script><script>Page.initProtected('admin');let state=Store.load();state.customers.forEach(c=>customerSelect.innerHTML+=`<option value="${c.customer_no}">${c.customer_name}</option>`);function render(){list.innerHTML=state.article_recommendations.map(r=>{const c=state.customers.find(x=>x.customer_no===r.customer_no)||{};return `<div class="card-row"><h3>${UI.escape(r.title)} ${UI.statusBadge(r.status)}</h3><p>${c.customer_name||r.customer_no} · <a href="${r.url}" target="_blank">${r.url}</a></p></div>`}).join('')||'<div class="empty">등록된 추천 기사가 없습니다.</div>';}pickForm.onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target);const r={id:'r'+Date.now(),customer_no:fd.get('customer_no'),title:fd.get('title'),url:fd.get('url'),status:'pending',created_at:Date.now()};state.article_recommendations.unshift(r);Store.save(state);const c=state.customers.find(x=>x.customer_no===r.customer_no);Webhook.send('pick_request',c.customer_no,c.customer_name,'추천 기사 Pick 요청이 등록되었습니다.');UI.toast('추천 기사를 등록했습니다.');e.target.reset();render();};render();</script></body></html>
