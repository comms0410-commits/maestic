<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maestic - AI 프롬프트</title><link rel="stylesheet" href="css/style.css"></head><body><nav id="navbar" class="navbar"></nav><main class="container"><header class="page-header"><div><p class="eyebrow">AI PROMPT & WEBHOOK</p><h1>AI 프롬프트 관리</h1><p>고객별 톤앤매너와 API/Webhook 설정을 관리합니다.</p></div></header><section class="grid dashboard-grid"><article class="panel"><div class="panel-header"><h2>고객별 프롬프트</h2></div><form id="promptForm" class="panel-body form"><label class="field"><span>고객</span><select id="customerSelect" name="customer_no"></select></label><label class="field"><span>톤앤매너</span><input class="input" name="brand_tone" placeholder="전문적이고 신뢰감 있게"></label><label class="field"><span>타겟</span><input class="input" name="target_audience" placeholder="잠재 고객"></label><label class="field"><span>CTA</span><input class="input" name="cta_text" placeholder="상담 문의 / 채널 구독"></label><label class="field"><span>금지 표현</span><textarea name="restrictions" rows="3"></textarea></label><button class="primary-btn">프롬프트 저장</button></form></article><article class="panel"><div class="panel-header"><h2>Webhook 설정</h2></div><form id="webhookForm" class="panel-body form"><label class="field"><span>Claw Webhook URL</span><input class="input" name="clawWebhookUrl"></label><label class="field"><span>LINE Webhook URL</span><input class="input" name="lineWebhookUrl"></label><label class="field"><span>LINE Access Token</span><input class="input" name="lineAccessToken"></label><label><input type="checkbox" name="enabled"> 알림 활성화</label><button class="primary-btn">설정 저장</button><button type="button" class="secondary-btn" id="testWebhook">테스트 발송</button></form></article></section></main><script src="js/common.js"></script><script>Page.initProtected('admin');let state=Store.load();state.customers.forEach(c=>customerSelect.innerHTML+=`<option value="${c.customer_no}">${c.customer_name}</option>`);function loadPrompt(){const p=state.prompts[customerSelect.value]||{};promptForm.brand_tone.value=p.brand_tone||'';promptForm.target_audience.value=p.target_audience||'';promptForm.cta_text.value=p.cta_text||'';promptForm.restrictions.value=p.restrictions||'';}function loadWebhook(){const c=Webhook.getConfig();webhookForm.clawWebhookUrl.value=c.clawWebhookUrl||'';webhookForm.lineWebhookUrl.value=c.lineWebhookUrl||'';webhookForm.lineAccessToken.value=c.lineAccessToken||'';webhookForm.enabled.checked=!!c.enabled;}customerSelect.onchange=loadPrompt;promptForm.onsubmit=e=>{e.preventDefault();state.prompts[customerSelect.value]={brand_tone:promptForm.brand_tone.value,target_audience:promptForm.target_audience.value,cta_text:promptForm.cta_text.value,restrictions:promptForm.restrictions.value};Store.save(state);UI.toast('프롬프트를 저장했습니다.');};webhookForm.onsubmit=e=>{e.preventDefault();Webhook.saveConfig({clawWebhookUrl:webhookForm.clawWebhookUrl.value,lineWebhookUrl:webhookForm.lineWebhookUrl.value,lineAccessToken:webhookForm.lineAccessToken.value,enabled:webhookForm.enabled.checked});UI.toast('Webhook 설정을 저장했습니다.');};testWebhook.onclick=()=>{Webhook.send('test','admin','관리자','Webhook 테스트 발송');UI.toast('테스트 알림 이력을 기록했습니다.');};loadPrompt();loadWebhook();</script></body></html>
