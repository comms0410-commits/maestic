<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maestic - 대본 관리</title><link rel="stylesheet" href="css/style.css"></head><body><nav id="navbar" class="navbar"></nav><main class="container"><header class="page-header"><div><p class="eyebrow">SCRIPT OPS</p><h1>대본 관리</h1><p>AI 초안 생성, 편집, 고객 검토 요청을 관리합니다.</p></div></header><section class="grid dashboard-grid"><article class="panel"><div class="panel-header"><h2>대본 작성</h2></div><form id="scriptForm" class="panel-body form"><label class="field"><span>고객</span><select name="customer_no" id="customerSelect"></select></label><label class="field"><span>제목</span><input class="input" name="title" required></label><label class="field"><span>본문</span><textarea name="body" rows="10" required></textarea></label><button class="primary-btn">저장 및 검토 요청</button></form></article><article class="panel"><div class="panel-header"><h2>대본 목록</h2></div><div id="list" class="panel-body stack"></div></article></section></main><script src="js/common.js"></script><script>Page.initProtected('admin');let state=Store.load();state.customers.forEach(c=>customerSelect.innerHTML+=`<option value="${c.customer_no}">${c.customer_name}</option>`);function render(){list.innerHTML=state.scripts.map(s=>{const c=state.customers.find(x=>x.customer_no===s.customer_no)||{};return `<div class="card-row"><h3>${UI.escape(s.title)} ${UI.statusBadge(s.status)}</h3><p>${c.customer_name||s.customer_no} · v${s.version}</p><p>${UI.escape(s.body)}</p></div>`}).join('');}scriptForm.onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target);const s={id:'s'+Date.now(),customer_no:fd.get('customer_no'),title:fd.get('title'),body:fd.get('body'),version:1,status:'reviewing',updated_at:Date.now()};state.scripts.unshift(s);Store.save(state);const c=state.customers.find(x=>x.customer_no===s.customer_no);Notifier.send('script_uploaded',c.customer_no,c.customer_name,'새 대본 검토 요청이 등록되었습니다.');UI.toast('대본을 저장했습니다.');e.target.reset();render();};render();</script></body></html>
