<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Maestic - 관리자 대시보드</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav id="navbar" class="navbar"></nav>

    <main class="container">
      <header class="page-header">
        <div>
          <p class="eyebrow">ADMIN DASHBOARD</p>
          <h1>관리자 대시보드</h1>
          <p>전체 고객 현황을 한눈에 확인하세요.</p>
        </div>
        <div class="actions">
          <button class="secondary-btn" onclick="Page.resetDemoData()">데이터 초기화</button>
          <button class="primary-btn" id="openCustomerModal">+ 고객 추가</button>
        </div>
      </header>

      <section id="metrics" class="grid metric-grid"></section>

      <section class="grid dashboard-grid">
        <article class="panel span-2">
          <div class="panel-header">
            <h2>고객 현황</h2>
            <div class="filters">
              <select id="productFilter">
                <option value="all">전체 상품</option>
                <option>콘텐츠형</option>
                <option>성장형</option>
                <option>제휴형</option>
                <option>기업형</option>
              </select>
              <select id="statusFilter">
                <option value="all">전체 상태</option>
                <option value="active">활성</option>
                <option value="contract_pending">계약대기</option><option value="inactive">비활성</option>
                <option value="attention">관리 필요</option>
              </select>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>고객</th>
                  <th>상품</th>
                  <th>주간 제작</th>
                  <th>업로드</th>
                  <th>계약</th>
                  <th>제작현황</th>
                  <th>예약</th>
                  <th>구독자</th>
                  <th>메모</th>
                  <th>관리</th>
                </tr>
              </thead>
              <tbody id="customerRows"></tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>관리 필요</h2>
            <span id="attentionCount" class="badge badge-warning">0</span>
          </div>
          <div id="attentionList" class="panel-body stack"></div>
        </article>

        <article class="panel">
          <div class="panel-header"><h2>구독자 TOP 5</h2></div>
          <div id="subscriberChart" class="panel-body stack"></div>
        </article>

        <article class="panel span-2">
          <div class="panel-header"><h2>이번 주 업로드 운영 큐</h2></div>
          <div id="scheduleBoard" class="panel-body schedule"></div>
        </article>
      </section>
    </main>

    <section id="customerModal" class="modal hidden">
      <form class="modal-card" id="customerForm">
        <div class="modal-head">
          <h2>고객 추가</h2>
          <button type="button" class="ghost-btn" onclick="customerModal.classList.add('hidden')">✕</button>
        </div>
        <div class="panel-body form-grid">
          <label class="field"><span>고객명 *</span><input class="input" name="customer_name" required /></label>
          <label class="field"><span>고객번호 *</span><input class="input" name="customer_no" required /></label>
          <label class="field">
            <span>가입상품 *</span>
            <select name="product_type">
              <option>콘텐츠형</option>
              <option>성장형</option>
              <option>제휴형</option>
              <option>기업형</option>
            </select>
          </label>
          <label class="field">
            <span>상태</span>
            <select name="status">
              <option value="active">활성</option>
              <option value="contract_pending">계약대기</option><option value="inactive">비활성</option>
              <option value="inactive">비활성</option>
            </select>
          </label>
          <label class="field"><span>계약금액/월</span><input class="input" name="monthly_fee" type="number" value="0" /></label>
          <label class="field"><span>계약회차(개월)</span><input class="input" name="contract_round" value="1" /></label>
          <label class="field"><span>월 제작 수량</span><input class="input" name="monthly_quota" type="number" value="20" /></label>
          <label class="field"><span>4자리 PIN</span><input class="input" name="pin_hash" maxlength="4" value="1234" /></label>
          <label class="field full"><span>비고</span><textarea name="internal_note" rows="3"></textarea></label>
          <div class="actions full">
            <button type="button" class="ghost-btn" onclick="customerModal.classList.add('hidden')">취소</button>
            <button class="primary-btn">저장</button>
          </div>
        </div>
      </form>
    </section>

    <section id="editCustomerModal" class="modal hidden">
      <form class="modal-card" id="editCustomerForm">
        <div class="modal-head">
          <h2>고객명 수정</h2>
          <button type="button" class="ghost-btn" onclick="editCustomerModal.classList.add('hidden')">✕</button>
        </div>
        <div class="panel-body form-grid">
          <input type="hidden" name="customer_no" />
          <label class="field"><span>고객번호</span><input class="input" name="readonly_customer_no" disabled /></label>
          <label class="field"><span>현재 고객명 *</span><input class="input" name="customer_name" required /></label>
          <label class="field full"><span>변경 메모</span><textarea name="change_note" rows="3" placeholder="예: 고객 요청에 따라 채널명을 변경"></textarea></label>
          <div class="actions full">
            <button type="button" class="ghost-btn" onclick="editCustomerModal.classList.add('hidden')">취소</button>
            <button class="primary-btn">고객명 저장</button>
          </div>
        </div>
      </form>
    </section>

    <script src="js/common.js"></script>
    <script>
      const session = Page.initProtected('admin');
      let state = Store.load();

      function renderMetrics() {
        const m = Metrics.summarize(state.customers);
        metrics.innerHTML = [
          ['활성 고객', `${m.activeCount}곳`, '전체 ' + m.totalCustomers + '곳'],
          ['계약대기', `${m.contractPendingCount}곳`, '미연장 비활성 분류'],
          ['주간 제작 목표', `${m.totalWeeklyTarget}개`, '현재 ' + m.producedThisWeek + '개 제작'],
          ['예약 업로드', `${m.reservedCount}곳`, '예약 상태 Y'],
          ['관리 필요', `${m.attentionCount}건`, '계약/검수/예약 확인'],
          ['총 구독자', UI.number(m.totalSubscribers), '채널 합산'],
        ]
          .map((x) => `<article class="metric-card"><span>${x[0]}</span><strong>${x[1]}</strong><small>${x[2]}</small></article>`)
          .join('');
      }

      function filtered() {
        return state.customers.filter(
          (c) =>
            (productFilter.value === 'all' || c.product_type === productFilter.value) &&
            (statusFilter.value === 'all' || c.status === statusFilter.value || (statusFilter.value === 'attention' && Metrics.needsAttention(c))) && c.status !== 'deleted',
        );
      }

      function renderTable() {
        customerRows.innerHTML = filtered()
          .map(
            (c) => `<tr>
              <td><div class="customer-cell"><strong>${UI.escape(c.customer_name)}</strong><small>No. ${c.customer_no}</small></div></td>
              <td>${UI.productBadge(c.product_type)}</td>
              <td>${c.weekly_target}</td>
              <td>${c.upload_cycle}</td>
              <td>${c.contract_round}</td>
              <td>${UI.progress(c.produced_this_week || 0, c.weekly_target_count || 0)}</td>
              <td>${c.reservation_status === 'Y' ? '<span class="badge badge-success">Y</span>' : '<span class="badge badge-warning">미진행</span>'}</td>
              <td>${UI.number(c.subscribers)}</td>
              <td>${UI.escape(c.internal_note || c.public_note || '특이사항 없음')}</td>
              <td><div class="actions"><button class="ghost-btn" type="button" onclick="openEditCustomer('${c.customer_no}')">고객명 수정</button>${Metrics.isLongUncontracted(c) ? `<button class="danger-btn" type="button" onclick="deleteLongUncontractedCustomer('${c.customer_no}')">장기 미계약 삭제</button>` : `<button class="secondary-btn" type="button" onclick="markContractPending('${c.customer_no}')">계약대기</button>`}</div></td>
            </tr>`,
          )
          .join('');
      }

      function renderAttention() {
        const list = state.customers.filter(Metrics.needsAttention);
        attentionCount.textContent = list.length;
        attentionList.innerHTML =
          list
            .map(
              (c) => `<div class="card-row warning"><h3>${UI.escape(c.customer_name)} ${UI.productBadge(c.product_type)}</h3><p>${UI.escape(
                c.internal_note || '예약 업로드/요청 상태 확인 필요',
              )}</p><button class="secondary-btn" onclick="notify('${c.customer_no}')">후속 조치 알림</button></div>`,
            )
            .join('') || '<div class="empty">관리 필요 고객이 없습니다.</div>';
      }

      function renderChart() {
        const top = [...state.customers].sort((a, b) => b.subscribers - a.subscribers).slice(0, 5);
        const max = top[0]?.subscribers || 1;
        subscriberChart.innerHTML = top
          .map(
            (c) => `<div class="bar-row"><div class="bar-label"><strong>${UI.escape(c.customer_name)}</strong><span>${UI.number(
              c.subscribers,
            )}</span></div><div class="bar-track"><span style="width:${Math.round((c.subscribers / max) * 100)}%"></span></div></div>`,
          )
          .join('');
      }

      function renderSchedule() {
        const days = ['월', '화', '수', '목', '금'];
        scheduleBoard.innerHTML = days
          .map((d) => {
            const list = state.customers.filter(
              (c) =>
                c.upload_cycle.includes('월~금') ||
                ((d === '화' || d === '금') && c.upload_cycle.includes('화, 금')) ||
                (d === '월' && c.upload_cycle.includes('검수후')),
            );
            return `<div class="day"><strong>${d}요일</strong>${list
              .map(
                (c) => `<span class="chip ${Metrics.needsAttention(c) ? 'warning' : 'success'}">${UI.escape(c.customer_name)}<small>${
                  c.reservation_status === 'Y' ? '예약' : '확인 필요'
                }</small></span>`,
              )
              .join('')}</div>`;
          })
          .join('');
      }

      function notify(no) {
        const c = state.customers.find((x) => x.customer_no === no);
        Notifier.send('status_update', c.customer_no, c.customer_name, '관리 필요 후속 조치가 등록되었습니다.');
        state = Store.load();
        UI.toast(c.customer_name + ' 후속 조치 알림을 등록했습니다.');
      }


      function markContractPending(no) {
        const c = state.customers.find((x) => x.customer_no === no);
        if (!c) return;
        c.status = 'contract_pending';
        c.contract_renewed = false;
        c.pending_months = Math.max(1, Number(c.pending_months || 0));
        Store.save(state);
        Notifier.send('contract_pending', c.customer_no, c.customer_name, '계약 연장이 확인되지 않아 계약대기/비활성 고객으로 분류되었습니다.');
        UI.toast(`${c.customer_name} 고객을 계약대기로 분류했습니다.`);
        render();
      }

      function deleteLongUncontractedCustomer(no) {
        const c = state.customers.find((x) => x.customer_no === no);
        if (!c || !Metrics.isLongUncontracted(c)) {
          UI.toast('장기간 미계약 고객만 삭제할 수 있습니다.', 'warning');
          return;
        }
        c.status = 'deleted';
        c.internal_note = c.internal_note ? `${c.internal_note} / 장기 미계약 삭제 처리` : '장기 미계약 삭제 처리';
        Store.save(state);
        Notifier.send('customer_deleted', c.customer_no, c.customer_name, '장기간 미계약 고객으로 삭제 처리되었습니다.');
        UI.toast(`${c.customer_name} 고객을 삭제 처리했습니다.`);
        render();
      }

      function openEditCustomer(no) {
        const c = state.customers.find((x) => x.customer_no === no);
        if (!c) return;
        editCustomerForm.customer_no.value = c.customer_no;
        editCustomerForm.readonly_customer_no.value = c.customer_no;
        editCustomerForm.customer_name.value = c.customer_name;
        editCustomerForm.change_note.value = '';
        editCustomerModal.classList.remove('hidden');
        editCustomerForm.customer_name.focus();
      }

      function saveCustomerName(event) {
        event.preventDefault();
        const no = editCustomerForm.customer_no.value;
        const nextName = editCustomerForm.customer_name.value.trim();
        const changeNote = editCustomerForm.change_note.value.trim();
        const c = state.customers.find((x) => x.customer_no === no);
        if (!c || !nextName) {
          UI.toast('고객명을 입력해 주세요.', 'warning');
          return;
        }
        const previousName = c.customer_name;
        c.customer_name = nextName;
        if (changeNote) {
          c.internal_note = c.internal_note ? `${c.internal_note} / ${changeNote}` : changeNote;
        }
        Store.save(state);
        Notifier.send('customer_name_updated', c.customer_no, c.customer_name, `고객명이 ${previousName}에서 ${nextName}(으)로 변경되었습니다.`);
        editCustomerModal.classList.add('hidden');
        UI.toast(`${previousName} 고객명을 ${nextName}(으)로 변경했습니다.`);
        render();
      }

      function render() {
        renderMetrics();
        renderTable();
        renderAttention();
        renderChart();
        renderSchedule();
      }

      productFilter.onchange = renderTable;
      statusFilter.onchange = renderTable;
      openCustomerModal.onclick = () => customerModal.classList.remove('hidden');
      editCustomerForm.onsubmit = saveCustomerName;
      customerForm.onsubmit = (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const c = Object.fromEntries(fd.entries());
        c.id = 'c' + c.customer_no;
        c.monthly_fee = Number(c.monthly_fee || 0);
        c.monthly_quota = Number(c.monthly_quota || 0);
        c.weekly_target = c.monthly_quota ? Math.round(c.monthly_quota / 4) + '개' : '요청시';
        c.weekly_target_count = c.monthly_quota ? Math.round(c.monthly_quota / 4) : 0;
        c.upload_cycle = '월~금';
        c.produced_this_week = 0;
        c.produced_total = '-';
        c.reservation_status = '미진행';
        c.subscribers = 0;
        c.public_note = '신규 등록 고객';
        state.customers.push(c);
        Store.save(state);
        customerModal.classList.add('hidden');
        UI.toast('고객을 추가했습니다.');
        render();
      };
      render();
    </script>
  </body>
</html>
