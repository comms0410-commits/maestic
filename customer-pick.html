<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maestic - 기사 Pick</title><link rel="stylesheet" href="css/style.css"></head><body><nav id="navbar" class="navbar"></nav><main class="container"><header class="page-header"><div><p class="eyebrow">MY ARTICLE PICK</p><h1>기사 Pick</h1><p>추천 기사 중 최대 5개를 선택하고 직접 URL도 제출할 수 있습니다.</p></div></header><form id="pickForm" class="panel"><div class="panel-header"><h2>추천 기사</h2><button class="primary-btn">최종 제출</button></div><div id="list" class="panel-body stack"></div><div class="panel-body form"><label class="field"><span>직접 입력 URL 1</span><input class="input" name="url1"></label><label class="field"><span>직접 입력 URL 2</span><input class="input" name="url2"></label><label class="field"><span>직접 입력 URL 3</span><input class="input" name="url3"></label></div></form></main><script src="js/common.js"></script><script>const session=Page.initProtected('customer');let state=Store.load();function render(){const recs=state.article_recommendations.filter(r=>r.customer_no===session.customerNo);list.innerHTML=recs.map(r=>`<label class="card-row"><h3><input type="checkbox" name="pick" value="${r.id}"> ${UI.escape(r.title)} ${UI.statusBadge(r.status)}</h3><p>${r.url}</p></label>`).join('')||'<div class="empty">추천 기사가 아직 없습니다.</div>';}pickForm.onsubmit=e=>{e.preventDefault();const picked=[...document.querySelectorAll('[name=pick]:checked')].map(x=>x.value);if(picked.length>5){UI.toast('최대 5개까지 선택할 수 있습니다.','warning');return;}state.article_recommendations.forEach(r=>{if(picked.includes(r.id))r.status='picked';});Store.save(state);Webhook.send('pick_submitted',session.customerNo,session.name,`고객이 기사 ${picked.length}개를 Pick했습니다.`);UI.toast('기사 Pick을 제출했습니다.');render();};render();</script></body></html>
