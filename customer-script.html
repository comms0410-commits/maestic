<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maestic - 내 대본</title><link rel="stylesheet" href="css/style.css"></head><body><nav id="navbar" class="navbar"></nav><main class="container"><header class="page-header"><div><p class="eyebrow">MY SCRIPTS</p><h1>내 대본</h1><p>대본을 검토하고 승인 또는 수정 요청을 남깁니다.</p></div></header><section id="list" class="grid"></section></main><script src="js/common.js"></script><script>const session=Page.initProtected('customer');let state=Store.load();function act(id,status){const s=state.scripts.find(x=>x.id===id);s.status=status;Store.save(state);Webhook.send(status==='approved'?'approval':'feedback',session.customerNo,session.name,status==='approved'?'대본이 승인되었습니다.':'대본 수정 요청이 등록되었습니다.');UI.toast(status==='approved'?'승인 완료':'수정 요청 완료');render();}function render(){const scripts=state.scripts.filter(s=>s.customer_no===session.customerNo);list.innerHTML=scripts.map(s=>`<article class="panel"><div class="panel-header"><h2>${UI.escape(s.title)} ${UI.statusBadge(s.status)}</h2><div class="actions"><button class="secondary-btn" onclick="act('${s.id}','revision_requested')">수정 요청</button><button class="primary-btn" onclick="act('${s.id}','approved')">승인</button></div></div><div class="panel-body"><p>${UI.escape(s.body)}</p><small class="muted">v${s.version} · ${new Date(s.updated_at).toLocaleString('ko-KR')}</small></div></article>`).join('')||'<div class="panel"><div class="empty">검토할 대본이 없습니다.</div></div>';}render();</script></body></html>
