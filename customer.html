<!doctype html>
<html lang="ko">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Maestic - 고객 대시보드</title><link rel="stylesheet" href="css/style.css" /></head>
  <body>
    <nav id="navbar" class="navbar"></nav>
    <main class="container">
      <header class="page-header"><div><p class="eyebrow">CUSTOMER DASHBOARD</p><h1 id="title">내 현황</h1><p>이번 달 KPI와 주차별 진행 현황, 관리자 알림을 확인합니다.</p></div></header>
      <section id="metrics" class="grid metric-grid"></section>
      <section class="grid dashboard-grid">
        <article class="panel"><div class="panel-header"><h2>주차별 진행 현황</h2></div><div id="weeks" class="panel-body stack"></div></article>
        <article class="panel"><div class="panel-header"><h2>담당자 메모</h2></div><div id="memo" class="panel-body"></div></article>
        <article class="panel span-2"><div class="panel-header"><h2>알림 및 답글</h2></div><div id="notifications" class="panel-body stack"></div></article>
      </section>
    </main>
    <script src="js/common.js"></script>
    <script>
      const session = Page.initProtected('customer');
      let state = Store.load();
      const customer = state.customers.find((c) => c.customer_no === session.customerNo);
      const monthKey = `${CURRENT_DATE.getUTCFullYear()}-${String(CURRENT_DATE.getUTCMonth() + 1).padStart(2, '0')}`;
      const [year, month] = monthKey.split('-').map(Number);
      const monthly = state.monthly_status.find((item) => item.customer_no === customer.customer_no && item.year === year && item.month === month) || {};
      function renderStatus() {
        title.textContent = customer.customer_name + ' 운영 현황';
        metrics.innerHTML = [['가입상품', customer.product_type, '운영 플랜'], ['월 제작 목표', customer.monthly_quota + '개', '이번 달'], ['현재 완료', `${monthly.total_completed || 0}개`, '1~5주차 합산'], ['예약 업로드', customer.reservation_status, customer.upload_cycle], ['구독자', UI.number(customer.subscribers), '현재 채널']].map((item) => `<article class="metric-card"><span>${item[0]}</span><strong>${item[1]}</strong><small>${item[2]}</small></article>`).join('');
        weeks.innerHTML = [1, 2, 3, 4, 5].map((week) => `<div class="card-row"><h3>${week}주차 <span>${monthly[`week${week}_done`] || 0}개 완료</span></h3><p>${UI.escape(monthly[`week${week}_info`] || '일정 확인 중')}</p>${UI.progress(monthly[`week${week}_done`] || 0, customer.weekly_target_count || 0)}</div>`).join('');
        memo.innerHTML = `<p>${UI.escape(monthly.public_note || customer.public_note || '공개 메모가 없습니다.')}</p>`;
      }
      function replyToNotification(id) {
        const textarea = document.querySelector(`[data-reply-for="${id}"]`);
        const message = textarea.value.trim();
        if (!message) { UI.toast('답글 내용을 입력해 주세요.', 'warning'); return; }
        Notifier.reply(id, 'customer', session.name, message);
        UI.toast('답글을 등록했습니다.');
        renderNotifications();
      }
      function renderNotifications() {
        state = Store.load();
        const customerNotifications = state.notifications.filter((notification) => notification.customer_no === session.customerNo);
        notifications.innerHTML = customerNotifications.map((notification) => `<div class="card-row"><h3>${UI.escape(notification.message)} ${UI.statusBadge(notification.send_status)}</h3><p>${notification.type} · ${new Date(notification.created_at).toLocaleString('ko-KR')}</p>${(notification.replies || []).map((reply) => `<div class="card-row"><p><strong>${UI.escape(reply.author_name)}</strong></p><p>${UI.escape(reply.message)}</p></div>`).join('')}<label class="field"><span>답글</span><textarea data-reply-for="${notification.id}" rows="3"></textarea></label><button class="secondary-btn" onclick="replyToNotification('${notification.id}')">답글 등록</button></div>`).join('') || '<div class="empty">확인할 알림이 없습니다.</div>';
      }
      renderStatus();
      renderNotifications();
    </script>
  </body>
</html>
