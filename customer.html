<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maestic - 고객 대시보드</title><link rel="stylesheet" href="css/style.css"></head><body><nav id="navbar" class="navbar"></nav><main class="container"><header class="page-header"><div><p class="eyebrow">CUSTOMER DASHBOARD</p><h1 id="title">내 현황</h1><p>이번 달 KPI와 주차별 진행 현황을 확인합니다.</p></div></header><section id="metrics" class="grid metric-grid"></section><section class="grid dashboard-grid"><article class="panel"><div class="panel-header"><h2>주차별 진행 현황</h2></div><div id="weeks" class="panel-body stack"></div></article><article class="panel"><div class="panel-header"><h2>담당자 메모</h2></div><div id="memo" class="panel-body"></div></article></section></main><script src="js/common.js"></script><script>const session=Page.initProtected('customer');const state=Store.load();const c=state.customers.find(x=>x.customer_no===session.customerNo);const m=state.monthly_status.find(x=>x.customer_no===c.customer_no)||{};title.textContent=c.customer_name+' 운영 현황';metrics.innerHTML=[['가입상품',c.product_type,'운영 플랜'],['월 제작 목표',c.monthly_quota+'개','이번 달'],['현재 완료',`${m.total_completed||0}개`,'누적 완료'],['예약 업로드',c.reservation_status,c.upload_cycle],['구독자',UI.number(c.subscribers),'현재 채널']].map(x=>`<article class="metric-card"><span>${x[0]}</span><strong>${x[1]}</strong><small>${x[2]}</small></article>`).join('');weeks.innerHTML=[1,2,3,4].map(w=>`<div class="card-row"><h3>${w}주차 <span>${m[`week${w}_done`]||0}개 완료</span></h3><p>${UI.escape(m[`week${w}_info`]||'일정 확인 중')}</p>${UI.progress(m[`week${w}_done`]||0,c.weekly_target_count||0)}</div>`).join('');memo.innerHTML=`<p>${UI.escape(m.public_note||c.public_note||'공개 메모가 없습니다.')}</p>`;</script></body></html>
