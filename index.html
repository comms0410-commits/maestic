<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maestic 운영 포털 - 로그인</title><link rel="stylesheet" href="css/style.css"></head><body class="login-body">
<main class="login-card"><section class="login-hero"><div class="logo">M</div><h1>Maestic 운영 포털</h1><p>유튜브 쇼츠 대행 고객의 제작, 업로드, 기사 Pick, 대본 검토, 알림을 통합 관리합니다.</p></section><section class="login-panel"><div class="tabs"><button class="tab active" data-role="customer">고객 로그인</button><button class="tab" data-role="admin">관리자 로그인</button></div>
<form id="customerForm" class="form"><label class="field"><span>고객번호 *</span><input class="input" name="id" value="011" required></label><label class="field"><span>4자리 PIN *</span><input class="input" name="credential" value="1234" maxlength="4" required></label><button class="primary-btn">로그인</button><p class="hint">PIN을 모르시면 담당자에게 문의해 주세요.</p></form>
<form id="adminForm" class="form hidden"><label class="field"><span>관리자 아이디 *</span><input class="input" name="id" value="admin" required></label><label class="field"><span>비밀번호 *</span><input class="input" name="credential" type="password" value="maestic2026!" required></label><button class="primary-btn">관리자 로그인</button><p class="hint">기본 계정: admin / maestic2026!</p></form></section></main>
<script src="js/common.js"></script><script>document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');customerForm.classList.toggle('hidden',btn.dataset.role!=='customer');adminForm.classList.toggle('hidden',btn.dataset.role!=='admin');}));function submit(role,form){const result=Auth.login(role,form.id.value.trim(),form.credential.value.trim());if(!result.success){UI.toast(result.message,'error');return;}location.href=role==='admin'?'admin.html':'customer.html';}customerForm.addEventListener('submit',e=>{e.preventDefault();submit('customer',e.target);});adminForm.addEventListener('submit',e=>{e.preventDefault();submit('admin',e.target);});</script></body></html>
